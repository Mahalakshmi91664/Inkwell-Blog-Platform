<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inkwell — Blog Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  
  /* ── Reset & Variables ─────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:      #0f0e0d;
    --paper:    #faf7f2;
    --cream:    #f2ede4;
    --sepia:    #c8b89a;
    --rust:     #c0533a;
    --rust-dk:  #9e3f2a;
    --mist:     #e8e2d9;
    --shadow:   rgba(15,14,13,0.12);
    --r:        10px;
    --ff-head:  'Playfair Display', Georgia, serif;
    --ff-body:  'DM Sans', system-ui, sans-serif;
    --trans:    0.22s cubic-bezier(0.4,0,0.2,1);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--ff-body);
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(192,83,58,0.07) 0%, transparent 70%);
  }

  /* ── Utility ───────────────────────────────────────────────────────── */
  .hidden { display: none !important; }
  .sr-only { position: absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }

  /* ── Header ────────────────────────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2.5rem;
    height: 64px;
    background: rgba(250,247,242,0.88);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--mist);
  }

  .logo {
    font-family: var(--ff-head);
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
    display: flex; align-items: center; gap: 0.4rem;
  }
  .logo span { color: var(--rust); }

  .header-actions {
    display: flex; align-items: center; gap: 1rem;
  }

  #user-badge {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--rust);
    background: rgba(192,83,58,0.1);
    padding: 0.3rem 0.8rem;
    border-radius: 99px;
    letter-spacing: 0.01em;
  }

  /* ── Buttons ───────────────────────────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-family: var(--ff-body);
    font-size: 0.85rem;
    font-weight: 500;
    padding: 0.5rem 1.2rem;
    border-radius: var(--r);
    border: none;
    cursor: pointer;
    transition: var(--trans);
    line-height: 1;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--rust);
    color: #fff;
  }
  .btn-primary:hover { background: var(--rust-dk); }

  .btn-ghost {
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--mist);
  }
  .btn-ghost:hover { border-color: var(--sepia); background: var(--cream); }

  .btn-danger {
    background: transparent;
    color: #b33;
    border: 1.5px solid rgba(180,50,50,0.2);
    font-size: 0.78rem;
    padding: 0.35rem 0.75rem;
  }
  .btn-danger:hover { background: rgba(180,50,50,0.07); border-color: #b33; }

  .btn-edit {
    background: transparent;
    color: var(--rust);
    border: 1.5px solid rgba(192,83,58,0.25);
    font-size: 0.78rem;
    padding: 0.35rem 0.75rem;
  }
  .btn-edit:hover { background: rgba(192,83,58,0.07); border-color: var(--rust); }

  .btn-sm {
    font-size: 0.78rem;
    padding: 0.38rem 0.9rem;
  }
  .btn-full { width: 100%; justify-content: center; }

  /* ── Main Layout ───────────────────────────────────────────────────── */
  main {
    max-width: 780px;
    margin: 0 auto;
    padding: 3rem 1.5rem 6rem;
  }

  /* ── Auth Section ──────────────────────────────────────────────────── */
  #auth-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4rem 0 2rem;
  }

  .auth-card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    border: 1px solid var(--mist);
    border-radius: 16px;
    padding: 2.5rem;
    box-shadow: 0 8px 40px var(--shadow);
    animation: fadeUp 0.4s ease both;
  }

  .auth-card h2 {
    font-family: var(--ff-head);
    font-size: 1.75rem;
    font-weight: 700;
    margin-bottom: 0.4rem;
    color: var(--ink);
  }
  .auth-card p {
    font-size: 0.88rem;
    color: #666;
    margin-bottom: 1.8rem;
  }

  .auth-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.8rem;
    background: var(--cream);
    padding: 0.3rem;
    border-radius: 8px;
  }
  .auth-tab {
    flex: 1;
    text-align: center;
    padding: 0.5rem;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: var(--trans);
    color: #888;
  }
  .auth-tab.active {
    background: #fff;
    color: var(--ink);
    box-shadow: 0 1px 4px var(--shadow);
  }

  /* ── Forms ─────────────────────────────────────────────────────────── */
  .form-group {
    margin-bottom: 1.1rem;
  }
  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    margin-bottom: 0.4rem;
    color: #555;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  input[type="text"], input[type="password"], textarea {
    width: 100%;
    font-family: var(--ff-body);
    font-size: 0.92rem;
    padding: 0.7rem 0.9rem;
    border: 1.5px solid var(--mist);
    border-radius: var(--r);
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: var(--trans);
    resize: vertical;
  }
  input:focus, textarea:focus {
    border-color: var(--rust);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(192,83,58,0.1);
  }
  textarea { min-height: 110px; }

  .error-msg {
    font-size: 0.82rem;
    color: #c0392b;
    margin-top: 0.8rem;
    padding: 0.6rem 0.9rem;
    background: rgba(192,57,43,0.07);
    border-radius: 8px;
    border-left: 3px solid #c0392b;
    display: none;
  }
  .error-msg.visible { display: block; }

  .success-msg {
    font-size: 0.82rem;
    color: #27ae60;
    margin-top: 0.8rem;
    padding: 0.6rem 0.9rem;
    background: rgba(39,174,96,0.07);
    border-radius: 8px;
    border-left: 3px solid #27ae60;
    display: none;
  }
  .success-msg.visible { display: block; }

  /* ── Blog Section ──────────────────────────────────────────────────── */
  #blog-section { animation: fadeUp 0.4s ease both; }

  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--mist);
  }
  .section-header h2 {
    font-family: var(--ff-head);
    font-size: 1.6rem;
    font-weight: 700;
  }

  /* ── New Post Form ─────────────────────────────────────────────────── */
  #new-post-form {
    background: #fff;
    border: 1px solid var(--mist);
    border-radius: 14px;
    padding: 1.8rem;
    margin-bottom: 2.5rem;
    box-shadow: 0 2px 16px var(--shadow);
    animation: fadeUp 0.3s ease both;
  }
  #new-post-form h3 {
    font-family: var(--ff-head);
    font-size: 1.2rem;
    margin-bottom: 1.2rem;
    color: var(--ink);
  }
  .form-actions {
    display: flex; gap: 0.7rem; margin-top: 1rem; justify-content: flex-end;
  }

  /* ── Post Cards ─────────────────────────────────────────────────────── */
  #posts-list { display: flex; flex-direction: column; gap: 1.5rem; }

  .post-card {
    background: #fff;
    border: 1px solid var(--mist);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 12px var(--shadow);
    transition: var(--trans);
    animation: fadeUp 0.35s ease both;
  }
  .post-card:hover {
    box-shadow: 0 6px 28px rgba(15,14,13,0.14);
    transform: translateY(-2px);
  }

  .post-body { padding: 1.6rem 1.8rem 1.2rem; }

  .post-meta {
    display: flex; align-items: center; gap: 0.6rem;
    font-size: 0.78rem; color: #888;
    margin-bottom: 0.75rem;
  }
  .post-meta .author {
    font-weight: 600;
    color: var(--rust);
    background: rgba(192,83,58,0.08);
    padding: 0.15rem 0.55rem;
    border-radius: 99px;
  }
  .post-meta .dot { color: var(--sepia); }

  .post-title {
    font-family: var(--ff-head);
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 0.75rem;
    color: var(--ink);
  }

  .post-content {
    font-size: 0.93rem;
    line-height: 1.7;
    color: #444;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .post-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.9rem 1.8rem;
    background: var(--cream);
    border-top: 1px solid var(--mist);
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .post-actions { display: flex; gap: 0.5rem; }

  .toggle-comments-btn {
    font-size: 0.8rem;
    font-weight: 500;
    color: #777;
    background: transparent;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; gap: 0.35rem;
    transition: var(--trans);
    padding: 0.3rem 0.5rem;
    border-radius: 6px;
  }
  .toggle-comments-btn:hover { color: var(--rust); background: rgba(192,83,58,0.06); }

  /* ── Comments ───────────────────────────────────────────────────────── */
  .comments-section {
    padding: 1.2rem 1.8rem 1.6rem;
    border-top: 1px solid var(--mist);
    background: var(--paper);
    animation: fadeDown 0.25s ease both;
  }

  .comments-list { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.2rem; }

  .comment-item {
    display: flex;
    gap: 0.9rem;
    padding: 0.85rem 1rem;
    background: #fff;
    border: 1px solid var(--mist);
    border-radius: 10px;
    animation: fadeUp 0.25s ease both;
  }

  .comment-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--rust);
    color: #fff;
    font-size: 0.8rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    text-transform: uppercase;
  }

  .comment-body { flex: 1; }
  .comment-author {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--rust);
    margin-bottom: 0.2rem;
  }
  .comment-date {
    font-size: 0.72rem;
    color: #aaa;
    margin-left: 0.5rem;
    font-weight: 400;
  }
  .comment-text {
    font-size: 0.88rem;
    line-height: 1.55;
    color: #444;
    word-break: break-word;
  }
  .comment-del {
    align-self: flex-start;
    background: transparent;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 1rem;
    line-height: 1;
    padding: 0.2rem;
    border-radius: 4px;
    transition: var(--trans);
  }
  .comment-del:hover { color: #c0392b; }

  .add-comment-form {
    display: flex;
    gap: 0.6rem;
    align-items: flex-end;
    margin-top: 0.5rem;
  }
  .add-comment-form textarea {
    min-height: 44px;
    max-height: 120px;
    flex: 1;
    resize: none;
  }

  .no-comments {
    font-size: 0.84rem;
    color: #aaa;
    text-align: center;
    padding: 1rem 0;
    font-style: italic;
  }

  /* ── Empty State ─────────────────────────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 5rem 2rem;
    color: #bbb;
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty-state h3 { font-family: var(--ff-head); font-size: 1.3rem; color: #999; margin-bottom: 0.5rem; }
  .empty-state p { font-size: 0.88rem; }

  /* ── Loading Spinner ─────────────────────────────────────────────────── */
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--mist);
    border-top-color: var(--rust);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 4rem auto;
  }

  /* ── Toast ───────────────────────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: var(--ink);
    color: #fff;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 0.75rem 1.5rem;
    border-radius: 99px;
    z-index: 9999;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.error { background: #c0392b; }
  #toast.success { background: #27ae60; }

  /* ── Edit Modal ──────────────────────────────────────────────────────── */
  #modal-overlay {
    position: fixed; inset: 0;
    background: rgba(15,14,13,0.55);
    backdrop-filter: blur(4px);
    z-index: 500;
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
    animation: fadeIn 0.2s ease;
  }
  .modal {
    background: #fff;
    border-radius: 16px;
    width: 100%; max-width: 520px;
    padding: 2rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: scaleIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal h3 {
    font-family: var(--ff-head);
    font-size: 1.35rem;
    margin-bottom: 1.4rem;
  }

  /* ── Animations ──────────────────────────────────────────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.9); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── Responsive ──────────────────────────────────────────────────────── */
  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    main { padding: 2rem 1rem 5rem; }
    .auth-card { padding: 1.8rem 1.4rem; }
    .post-body { padding: 1.2rem 1.2rem 0.9rem; }
    .post-footer { padding: 0.8rem 1.2rem; }
    .comments-section { padding: 1rem 1.2rem 1.4rem; }
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">Ink<span>well</span></div>
  <div class="header-actions">
    <span id="user-badge" class="hidden"></span>
    <button id="btn-logout" class="btn btn-ghost hidden" onclick="logout()">Sign out</button>
    <button id="btn-new-post" class="btn btn-primary hidden" onclick="showNewPostForm()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Post
    </button>
  </div>
</header>

<!-- Toast -->
<div id="toast"></div>

<!-- Edit Modal -->
<div id="modal-overlay" class="hidden">
  <div class="modal">
    <h3>Edit Post</h3>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="edit-title" placeholder="Post title…" />
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea id="edit-content" rows="6" placeholder="Write your story…"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitEdit()">Save Changes</button>
    </div>
  </div>
</div>

<main>
  <!-- Auth Section -->
  <div id="auth-section">
    <div class="auth-card">
      <h2>Welcome back.</h2>
      <p>Your corner of the internet awaits.</p>
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
        <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</div>
      </div>

      <!-- Login -->
      <div id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-username" placeholder="your username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"
            onkeydown="if(event.key==='Enter') doLogin()" />
        </div>
        <div id="login-error" class="error-msg"></div>
        <div style="margin-top:1.2rem">
          <button class="btn btn-primary btn-full" onclick="doLogin()">Sign In</button>
        </div>
      </div>

      <!-- Register -->
      <div id="register-form" class="hidden">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="choose a username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="min 4 characters" autocomplete="new-password"
            onkeydown="if(event.key==='Enter') doRegister()" />
        </div>
        <div id="reg-error" class="error-msg"></div>
        <div id="reg-success" class="success-msg"></div>
        <div style="margin-top:1.2rem">
          <button class="btn btn-primary btn-full" onclick="doRegister()">Create Account</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Blog Section -->
  <div id="blog-section" class="hidden">
    <div class="section-header">
      <h2>Latest Posts</h2>
      <span id="post-count" style="font-size:0.85rem;color:#aaa;"></span>
    </div>

    <!-- New Post Form -->
    <div id="new-post-form" class="hidden">
      <h3>✍️ Write a new post</h3>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="new-title" placeholder="Give it a great title…" />
      </div>
      <div class="form-group">
        <label>Content</label>
        <textarea id="new-content" rows="5" placeholder="What's on your mind?"></textarea>
      </div>
      <div id="post-error" class="error-msg"></div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="hideNewPostForm()">Cancel</button>
        <button class="btn btn-primary" onclick="createPost()">Publish Post</button>
      </div>
    </div>

    <!-- Posts List -->
    <div id="posts-list">
      <div class="spinner"></div>
    </div>
  </div>
</main>

<script>
  const BASE_URL = window.location.origin === "null"
  ? "http://127.0.0.1:5000"
  : window.location.origin;
  
/* ── Config ────────────────────────────────────────────────────────── */

const API = "https://inkwell-blog-platform.onrender.com"


/* ── State ─────────────────────────────────────────────────────────── */
let currentUser = null;   // { id, username }
let editingPostId = null;
let openCommentPosts = new Set();

/* ── Startup ────────────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('inkwell_user');
  if (saved) {
    currentUser = JSON.parse(saved);
    showBlog();
  }
});

/* ── Auth Tab Switch ─────────────────────────────────────────────────── */
function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
  clearErrors();
}

function clearErrors() {
  ['login-error','reg-error','reg-success','post-error'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.remove('visible'); el.textContent = ''; }
  });
}

/* ── Login ──────────────────────────────────────────────────────────── */
async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.classList.remove('visible');

  if (!username || !password) {
    errEl.textContent = 'Please fill in all fields.';
    errEl.classList.add('visible');
    return;
  }

  try {
    const res = await fetch(`${API}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Login failed.';
      errEl.classList.add('visible');
      return;
    }
    currentUser = data.user;
    localStorage.setItem('inkwell_user', JSON.stringify(currentUser));
    toast(`Welcome back, ${currentUser.username}! 👋`, 'success');
    showBlog();
  } catch (e) {
    errEl.textContent = 'Cannot connect to server. Is app.py running?';
    errEl.classList.add('visible');
  }
}

/* ── Register ───────────────────────────────────────────────────────── */
async function doRegister() {
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value.trim();
  const errEl = document.getElementById('reg-error');
  const okEl  = document.getElementById('reg-success');
  errEl.classList.remove('visible');
  okEl.classList.remove('visible');

  if (!username || !password) {
    errEl.textContent = 'Please fill in all fields.';
    errEl.classList.add('visible');
    return;
  }

  try {
    const res = await fetch(`${API}/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Registration failed.';
      errEl.classList.add('visible');
      return;
    }
    okEl.textContent = '✓ Account created! You can now sign in.';
    okEl.classList.add('visible');
    document.getElementById('reg-username').value = '';
    document.getElementById('reg-password').value = '';
    setTimeout(() => switchTab('login'), 1400);
  } catch (e) {
    errEl.textContent = 'Cannot connect to server. Is app.py running?';
    errEl.classList.add('visible');
  }
}

/* ── Show / Hide Blog ────────────────────────────────────────────────── */
function showBlog() {
  document.getElementById('auth-section').classList.add('hidden');
  document.getElementById('blog-section').classList.remove('hidden');
  document.getElementById('user-badge').textContent = `@${currentUser.username}`;
  document.getElementById('user-badge').classList.remove('hidden');
  document.getElementById('btn-logout').classList.remove('hidden');
  document.getElementById('btn-new-post').classList.remove('hidden');
  loadPosts();
}

function logout() {
  currentUser = null;
  localStorage.removeItem('inkwell_user');
  openCommentPosts.clear();
  document.getElementById('blog-section').classList.add('hidden');
  document.getElementById('new-post-form').classList.add('hidden');
  document.getElementById('auth-section').classList.remove('hidden');
  document.getElementById('user-badge').classList.add('hidden');
  document.getElementById('btn-logout').classList.add('hidden');
  document.getElementById('btn-new-post').classList.add('hidden');
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  clearErrors();
  toast('Signed out successfully.');
}

/* ── Load Posts ──────────────────────────────────────────────────────── */
async function loadPosts() {
  const list = document.getElementById('posts-list');
  list.innerHTML = '<div class="spinner"></div>';

  try {
    const res = await fetch(`${API}/posts`);
    const posts = await res.json();

    document.getElementById('post-count').textContent =
      posts.length === 0 ? '' : `${posts.length} post${posts.length !== 1 ? 's' : ''}`;

    if (posts.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="icon">📝</div>
          <h3>No posts yet</h3>
          <p>Be the first to share something with the world.</p>
        </div>`;
      return;
    }

    list.innerHTML = '';
    posts.forEach((p, i) => {
      const card = buildPostCard(p, i);
      list.appendChild(card);
      if (openCommentPosts.has(p.id)) {
        showComments(p.id, card);
      }
    });
  } catch (e) {
    list.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>Connection Error</h3><p>Make sure app.py is running on port 5000.</p></div>`;
  }
}

function buildPostCard(p, i) {
  const isOwner = currentUser && currentUser.id === p.user_id;
  const div = document.createElement('div');
  div.className = 'post-card';
  div.id = `post-${p.id}`;
  div.style.animationDelay = `${i * 0.06}s`;

  div.innerHTML = `
    <div class="post-body">
      <div class="post-meta">
        <span class="author">@${escHtml(p.author)}</span>
        <span class="dot">·</span>
        <span>${escHtml(p.created_at)}</span>
      </div>
      <div class="post-title">${escHtml(p.title)}</div>
      <div class="post-content">${escHtml(p.content)}</div>
    </div>
    <div class="post-footer">
      <button class="toggle-comments-btn" id="toggle-btn-${p.id}" onclick="toggleComments(${p.id}, this.closest('.post-card'))">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        ${p.comment_count} comment${p.comment_count !== 1 ? 's' : ''}
      </button>
      <div class="post-actions">
        ${isOwner ? `
          <button class="btn btn-edit" onclick="openEditModal(${p.id}, '${escAttr(p.title)}', '${escAttr(p.content)}')">Edit</button>
          <button class="btn btn-danger" onclick="deletePost(${p.id})">Delete</button>
        ` : ''}
      </div>
    </div>
  `;
  return div;
}

/* ── Create Post ─────────────────────────────────────────────────────── */
function showNewPostForm() {
  document.getElementById('new-post-form').classList.remove('hidden');
  document.getElementById('new-title').focus();
}
function hideNewPostForm() {
  document.getElementById('new-post-form').classList.add('hidden');
  document.getElementById('new-title').value = '';
  document.getElementById('new-content').value = '';
  clearErrors();
}

async function createPost() {
  const title   = document.getElementById('new-title').value.trim();
  const content = document.getElementById('new-content').value.trim();
  const errEl   = document.getElementById('post-error');
  errEl.classList.remove('visible');

  if (!title || !content) {
    errEl.textContent = 'Title and content are both required.';
    errEl.classList.add('visible');
    return;
  }

  try {
    const res = await fetch(`${API}/posts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, content, user_id: currentUser.id })
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Could not create post.';
      errEl.classList.add('visible');
      return;
    }
    hideNewPostForm();
    toast('Post published! ✨', 'success');
    loadPosts();
  } catch (e) {
    errEl.textContent = 'Server error.';
    errEl.classList.add('visible');
  }
}

/* ── Edit Post ───────────────────────────────────────────────────────── */
function openEditModal(id, title, content) {
  editingPostId = id;
  document.getElementById('edit-title').value   = title;
  document.getElementById('edit-content').value = content;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  editingPostId = null;
}
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

async function submitEdit() {
  const title   = document.getElementById('edit-title').value.trim();
  const content = document.getElementById('edit-content').value.trim();
  if (!title || !content) { toast('Title and content are required.', 'error'); return; }

  try {
    const res = await fetch(`${API}/posts/${editingPostId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, content, user_id: currentUser.id })
    });
    const data = await res.json();
    if (!res.ok) { toast(data.error || 'Could not update post.', 'error'); return; }
    closeModal();
    toast('Post updated!', 'success');
    loadPosts();
  } catch (e) {
    toast('Server error.', 'error');
  }
}

/* ── Delete Post ─────────────────────────────────────────────────────── */
async function deletePost(id) {
  if (!confirm('Delete this post and all its comments?')) return;
  try {
    const res = await fetch(`${API}/posts/${id}`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: currentUser.id })
    });
    if (!res.ok) { const d = await res.json(); toast(d.error || 'Delete failed.', 'error'); return; }
    openCommentPosts.delete(id);
    toast('Post deleted.', 'success');
    loadPosts();
  } catch (e) {
    toast('Server error.', 'error');
  }
}

/* ── Comments Toggle ─────────────────────────────────────────────────── */
function toggleComments(postId, card) {
  const existing = card.querySelector('.comments-section');
  if (existing) {
    existing.remove();
    openCommentPosts.delete(postId);
    updateToggleBtn(postId, false);
  } else {
    showComments(postId, card);
    openCommentPosts.add(postId);
  }
}

function updateToggleBtn(postId, open) {
  const btn = document.getElementById(`toggle-btn-${postId}`);
  if (!btn) return;
  // label stays the same (count), just visual hint
}

async function showComments(postId, card) {
  // Remove existing to re-render
  const old = card.querySelector('.comments-section');
  if (old) old.remove();

  const section = document.createElement('div');
  section.className = 'comments-section';
  section.innerHTML = '<div class="spinner" style="width:24px;height:24px;border-width:2px;margin:1rem auto"></div>';
  card.appendChild(section);

  try {
    const res = await fetch(`${API}/comments/${postId}`);
    const comments = await res.json();
    renderComments(section, comments, postId);
  } catch (e) {
    section.innerHTML = '<p style="color:#c00;font-size:0.82rem">Failed to load comments.</p>';
  }
}

function renderComments(section, comments, postId) {
  const listHtml = comments.length === 0
    ? '<p class="no-comments">No comments yet. Start the conversation!</p>'
    : `<div class="comments-list">${comments.map(c => buildCommentHTML(c)).join('')}</div>`;

  const canComment = !!currentUser;
  section.innerHTML = `
    ${listHtml}
    ${canComment ? `
      <div class="add-comment-form">
        <textarea id="comment-input-${postId}" placeholder="Add a comment…" rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addComment(${postId})}"></textarea>
        <button class="btn btn-primary btn-sm" onclick="addComment(${postId})">Post</button>
      </div>
    ` : '<p style="font-size:0.82rem;color:#aaa;margin-top:0.5rem">Sign in to comment.</p>'}
  `;
}

function buildCommentHTML(c) {
  const isOwner = currentUser && currentUser.id === c.user_id;
  const initial = c.username.charAt(0).toUpperCase();
  return `
    <div class="comment-item" id="comment-${c.id}">
      <div class="comment-avatar">${initial}</div>
      <div class="comment-body">
        <div class="comment-author">@${escHtml(c.username)} <span class="comment-date">${escHtml(c.created_at)}</span></div>
        <div class="comment-text">${escHtml(c.text)}</div>
      </div>
      ${isOwner ? `<button class="comment-del" title="Delete comment" onclick="deleteComment(${c.id}, ${c.post_id})">✕</button>` : ''}
    </div>
  `;
}

/* ── Add Comment ─────────────────────────────────────────────────────── */
async function addComment(postId) {
  const input = document.getElementById(`comment-input-${postId}`);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;

  try {
    const res = await fetch(`${API}/comments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, user_id: currentUser.id, post_id: postId })
    });
    if (!res.ok) { const d = await res.json(); toast(d.error || 'Comment failed.', 'error'); return; }
    input.value = '';
    // Refresh comment section only
    const card = document.getElementById(`post-${postId}`);
    if (card) {
      openCommentPosts.add(postId);
      showComments(postId, card);
    }
    // Update comment count
    loadPosts();
  } catch (e) {
    toast('Server error.', 'error');
  }
}

/* ── Delete Comment ──────────────────────────────────────────────────── */
async function deleteComment(commentId, postId) {
  try {
    const res = await fetch(`${API}/comments/${commentId}`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: currentUser.id })
    });
    if (!res.ok) { const d = await res.json(); toast(d.error || 'Delete failed.', 'error'); return; }
    const card = document.getElementById(`post-${postId}`);
    if (card) showComments(postId, card);
    loadPosts();
  } catch (e) {
    toast('Server error.', 'error');
  }
}

/* ── Toast ───────────────────────────────────────────────────────────── */
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type ? `show ${type}` : 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = type; }, 3000);
}

/* ── Helpers ─────────────────────────────────────────────────────────── */
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(str) {
  return String(str).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');
}
</script>
